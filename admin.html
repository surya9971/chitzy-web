<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chitzy Admin — Moderation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #070C0B;
      color: #F1F5F9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #0F1714;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px;
      width: 360px;
    }
    .login-box h1 { font-size: 24px; font-weight: 800; color: #0D9488; margin-bottom: 4px; }
    .login-box p  { color: #475569; font-size: 13px; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 16px;
      background: #162019; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #F1F5F9; font-size: 14px;
      margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #0D9488; }
    .btn-primary {
      width: 100%; padding: 12px; background: #0D9488;
      border: none; border-radius: 10px; color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-primary:hover { background: #0f7a70; }
    .login-error { color: #F87171; font-size: 13px; margin-top: 10px; text-align: center; }

    /* ── MAIN ── */
    #main-screen { display: none; }
    .topbar {
      background: #0F1714;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-size: 18px; font-weight: 800; color: #0D9488; }
    .topbar-stats { display: flex; gap: 16px; }
    .stat-pill {
      background: rgba(13,148,136,0.1); border: 1px solid rgba(13,148,136,0.2);
      border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #5EEAD4;
    }
    .stat-pill.red { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.2); color: #F87171; }
    .stat-pill.orange { background: rgba(249,115,22,0.1); border-color: rgba(249,115,22,0.2); color: #FB923C; }
    .btn-logout {
      background: transparent; border: 1px solid rgba(255,255,255,0.12);
      color: #475569; padding: 6px 14px; border-radius: 8px;
      cursor: pointer; font-size: 13px;
    }
    .btn-logout:hover { border-color: #F87171; color: #F87171; }

    /* ── FILTERS ── */
    .filters {
      padding: 16px 24px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: #94A3B8; cursor: pointer; font-size: 13px;
    }
    .filter-btn.active { background: #0D9488; border-color: #0D9488; color: #fff; }
    .search-input {
      padding: 7px 14px; background: #0F1714;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
      color: #F1F5F9; font-size: 13px; outline: none; width: 220px; margin-left: auto;
    }
    .search-input:focus { border-color: #0D9488; }

    /* ── USER ROWS ── */
    .table-wrap { padding: 0 24px 40px; }
    .user-group {
      background: #0F1714;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .user-group.has-pending { border-color: rgba(249,115,22,0.25); }
    .user-group.is-blocked  { border-color: rgba(248,113,113,0.2); }

    .user-row {
      display: grid;
      grid-template-columns: 1fr 80px 180px 160px 200px;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      gap: 12px;
      transition: background 0.15s;
    }
    .user-row:hover { background: rgba(255,255,255,0.02); }

    .user-info { display: flex; flex-direction: column; gap: 3px; }
    .user-name  { font-weight: 700; font-size: 14px; color: #F1F5F9; display: flex; align-items: center; gap: 6px; }
    .user-phone { color: #475569; font-size: 11px; font-family: monospace; }
    .user-meta  { color: #475569; font-size: 11px; }

    .report-badge {
      display: flex; flex-direction: column; align-items: center;
      font-weight: 800; font-size: 22px; line-height: 1;
    }
    .report-badge span { font-size: 10px; font-weight: 400; color: #475569; margin-top: 2px; }
    .report-badge.high { color: #F87171; }
    .report-badge.med  { color: #FB923C; }
    .report-badge.low  { color: #5EEAD4; }

    .latest-msg {
      color: #94A3B8; font-size: 12px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .block-status { font-size: 12px; }
    .block-status.perm  { color: #F87171; font-weight: 600; }
    .block-status.temp  { color: #FB923C; }
    .block-status.clean { color: #475569; }

    .user-actions { display: flex; flex-direction: column; gap: 5px; }
    .action-row   { display: flex; gap: 4px; }
    .btn-action {
      flex: 1; padding: 5px 8px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1); background: transparent;
      color: #94A3B8; font-size: 11px; cursor: pointer; text-align: center;
      white-space: nowrap;
    }
    .btn-action:hover        { border-color: #0D9488; color: #0D9488; background: rgba(13,148,136,0.08); }
    .btn-action.danger:hover { border-color: #F87171; color: #F87171; background: rgba(248,113,113,0.08); }
    .btn-action.perm:hover   { border-color: #F87171; color: #fff; background: #F87171; }
    .btn-action.nothing:hover{ border-color: #34D399; color: #34D399; background: rgba(52,211,153,0.08); }

    .expand-icon { font-size: 10px; color: #475569; transition: transform 0.2s; display: inline-block; }
    .expanded .expand-icon { transform: rotate(90deg); }

    /* ── REPORT DETAIL PANEL ── */
    .reports-panel {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: #070C0B;
    }
    .reports-panel.open { display: block; }

    .report-item {
      display: grid;
      grid-template-columns: 1fr 120px 120px;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      align-items: start;
    }
    .report-item:last-child { border-bottom: none; }
    .report-msg { color: #94A3B8; font-size: 13px; line-height: 1.5; word-break: break-word; }
    .report-date { color: #475569; font-size: 11px; white-space: nowrap; }

    .status-badge {
      display: inline-block; padding: 3px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .status-badge.pending  { background: rgba(249,115,22,0.15); color: #FB923C; }
    .status-badge.reviewed { background: rgba(255,255,255,0.06); color: #475569; }
    .status-badge.actioned { background: rgba(52,211,153,0.15); color: #34D399; }

    .plan-badge {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 10px; font-weight: 700;
    }
    .plan-badge.pro  { background: rgba(249,115,22,0.2); color: #FB923C; }
    .plan-badge.free { background: rgba(255,255,255,0.06); color: #475569; }

    .note-input {
      width: 100%; padding: 5px 8px; background: #162019;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
      color: #94A3B8; font-size: 11px; outline: none; resize: none;
    }
    .note-input:focus { border-color: rgba(13,148,136,0.4); }

    /* ── EMPTY / LOADING ── */
    .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
    .empty-state h3 { font-size: 18px; color: #94A3B8; margin-bottom: 8px; }
    #loading-msg { text-align: center; padding: 40px; color: #475569; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #0F1714; border: 1px solid rgba(13,148,136,0.3);
      border-radius: 12px; padding: 12px 20px;
      color: #F1F5F9; font-size: 14px; font-weight: 500;
      opacity: 0; transform: translateY(8px);
      transition: all 0.25s; pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: rgba(248,113,113,0.3); }

    /* ── TOTP MODAL ── */
    #totp-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 500;
      align-items: center; justify-content: center;
    }
    #totp-modal.open { display: flex; }
    .totp-box {
      background: #0F1714; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 28px; width: 320px;
    }
    .totp-box h3 { font-size: 16px; margin-bottom: 8px; }
    .totp-box p  { color: #475569; font-size: 13px; margin-bottom: 16px; }
    .totp-box input {
      width: 100%; padding: 10px 14px; background: #162019;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #F1F5F9; font-size: 18px; letter-spacing: 6px;
      text-align: center; outline: none; margin-bottom: 12px;
    }
    .totp-box input:focus { border-color: #0D9488; }
    .totp-error { color: #F87171; font-size: 12px; margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h1>chitzy</h1>
    <p>Admin Moderation Dashboard</p>
    <input type="password" id="admin-pass" placeholder="Admin password" onkeydown="if(event.key==='Enter')document.getElementById('admin-totp').focus()" />
    <input type="text" id="admin-totp" placeholder="2FA code (Google Authenticator)" inputmode="numeric" maxlength="6" onkeydown="if(event.key==='Enter')login()" style="letter-spacing:4px" />
    <button class="btn-primary" onclick="login()">Sign In →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="main-screen">
  <div class="topbar">
    <div class="topbar-left">
      <h1>chitzy admin</h1>
      <div class="topbar-stats">
        <span class="stat-pill red"    id="stat-pending">— pending</span>
        <span class="stat-pill orange" id="stat-users">— users</span>
        <span class="stat-pill"        id="stat-total">— reports</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-primary" style="width:auto;padding:7px 16px;font-size:13px" onclick="loadReports()">↻ Refresh</button>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('pending',this)">Has Pending</button>
    <button class="filter-btn" onclick="setFilter('all',this)">All Users</button>
    <button class="filter-btn" onclick="setFilter('blocked',this)">Blocked</button>
    <button class="filter-btn" onclick="setFilter('actioned',this)">Actioned</button>
    <button class="filter-btn" id="perm-blocks-btn" onclick="showPermBlocks(this)" style="border-color:rgba(248,113,113,0.4);color:#F87171">⛔ Perm Blocks</button>
    <input class="search-input" type="text" placeholder="Search name / phone / message…" oninput="applySearch(this.value)" />
  </div>

  <div class="table-wrap">
    <div id="loading-msg">Loading reports…</div>
    <div id="groups-container"></div>
    <div id="perm-blocks-container" style="display:none"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      <h3>No reports found</h3>
      <p>Nothing matches your current filter.</p>
    </div>
  </div>
</div>


<div id="toast"></div>

<script>
const EDGE = 'https://hupqcccvzkgetxrausda.supabase.co/functions/v1/admin-action';
let adminPassword = '';
let adminTOTP = '';
let allReports   = [];   // flat list from server
let userGroups   = [];   // grouped by reported_user_id
let currentFilter = 'pending';
let searchQuery   = '';
let sessionToken  = '';   // returned by server on login, valid 15 min — replaces TOTP on all subsequent calls
let pendingAction = null; // { body } — replayed after TOTP refresh

// ── SESSION TIMEOUT (15 min) ──────────────────────────────────────────────────
const SESSION_TIMEOUT = 15 * 60 * 1000;
let sessionTimer = null;

function resetSessionTimer() {
  clearTimeout(sessionTimer);
  if (!adminPassword) return;
  sessionTimer = setTimeout(() => {
    logout();
    document.getElementById('login-error').textContent = 'Session expired after 15 minutes. Please sign in again.';
  }, SESSION_TIMEOUT);
}

// Reset timer on any user interaction
['click', 'keydown', 'mousemove'].forEach(evt =>
  document.addEventListener(evt, () => { if (adminPassword) resetSessionTimer(); }, { passive: true })
);

// ── SESSION PERSISTENCE (survives page refresh, clears on tab close) ──────────
function saveSession() {
  localStorage.setItem('chitzy_admin', JSON.stringify({
    password: adminPassword,
    token:    sessionToken,
    savedAt:  Date.now(),
  }));
}

function restoreSession() {
  try {
    const raw = localStorage.getItem('chitzy_admin');
    if (!raw) return false;
    const { password, token, savedAt } = JSON.parse(raw);
    if (!password || !token) return false;
    if (Date.now() - savedAt > SESSION_TIMEOUT) {
      localStorage.removeItem('chitzy_admin');
      return false;
    }
    adminPassword = password;
    sessionToken  = token;
    return true;
  } catch { return false; }
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
async function login() {
  const pass = document.getElementById('admin-pass').value.trim();
  const totp = document.getElementById('admin-totp').value.trim();
  if (!pass) return;
  document.getElementById('login-error').textContent = '';

  const res = await callAdmin({ action: 'get_reports' }, pass, totp);
  if (res.error) {
    const msg = res.error === 'Unauthorized'         ? 'Wrong password.' :
                res.error === 'Invalid 2FA code'     ? 'Wrong 2FA code.' :
                res.error === '2FA code required'    ? '2FA code required.' : res.error;
    document.getElementById('login-error').textContent = msg;
    return;
  }
  adminPassword = pass;
  adminTOTP = totp;
  sessionToken = res.session_token || '';
  saveSession();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  resetSessionTimer();
  processReports(res.reports || []);
}

function logout() {
  clearTimeout(sessionTimer);
  adminPassword = '';
  adminTOTP = '';
  sessionToken = '';
  localStorage.removeItem('chitzy_admin');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('admin-pass').value = '';
  document.getElementById('admin-totp').value = '';
}

// ── API ───────────────────────────────────────────────────────────────────────
async function callAdmin(body, pass, totp) {
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (pass || adminPassword) headers['x-admin-password'] = pass || adminPassword;
    // Use session token for all calls after login — falls back to TOTP only on initial login
    if (sessionToken && !pass) {
      headers['x-admin-session'] = sessionToken;
    } else {
      const totpCode = totp || adminTOTP;
      if (totpCode) headers['x-admin-totp'] = totpCode;
    }
    const res  = await fetch(EDGE, { method: 'POST', headers, body: JSON.stringify(body) });
    const data = await res.json();
    // Update session token if server refreshed it
    if (data.session_token) { sessionToken = data.session_token; saveSession(); }
    // Session expired — force logout so admin re-authenticates cleanly
    if (data.error === 'Invalid 2FA code' || data.error === 'Unauthorized' || data.error === '2FA code required') {
      logout();
      document.getElementById('login-error').textContent = 'Session expired. Please sign in again.';
      return { __session_expired: true };
    }
    return data;
  } catch (e) {
    return { error: e.message };
  }
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadReports() {
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('groups-container').innerHTML = '';
  document.getElementById('empty-state').style.display = 'none';
  const res = await callAdmin({ action: 'get_reports' });
  if (res.__session_expired) return;
  if (res.error) { showToast('Error: ' + res.error, true); return; }
  processReports(res.reports || []);
}

// ── DATA ──────────────────────────────────────────────────────────────────────
function processReports(reports) {
  allReports = reports;

  // Group by reported_user_id — skip reports where account was deleted (reported_user is null AND no device_id)
  const map = {};
  const deletedGroup = { uid: '__deleted__', user: null, phone: '—', reports: [], pendingCount: 0, allActioned: true, isDeleted: true };

  for (const r of reports) {
    const uid = r.reported_user_id || r.reported_user?.id;
    if (!uid) {
      // Account deleted — group separately if they have a device_id we can still block
      deletedGroup.reports.push(r);
      if (r.status === 'pending') deletedGroup.pendingCount++;
      if (r.status !== 'actioned') deletedGroup.allActioned = false;
      continue;
    }
    if (!map[uid]) {
      map[uid] = {
        uid,
        user: r.reported_user || {},
        phone: r.reported_user_phone || '—',
        reports: [],
        pendingCount: 0,
        allActioned: true,
        isDeleted: false,
        deviceHistory: null,
      };
    }
    map[uid].reports.push(r);
    if (r.status === 'pending') map[uid].pendingCount++;
    if (r.status !== 'actioned') map[uid].allActioned = false;
    if (r.device_history && !map[uid].deviceHistory) {
      map[uid].deviceHistory = r.device_history;
    }
  }

  // Add deleted group at the bottom if it has unactioned reports
  if (deletedGroup.reports.length && !deletedGroup.allActioned) {
    map['__deleted__'] = deletedGroup;
  }

  // Sort: most pending first, then most reports
  userGroups = Object.values(map).sort((a, b) =>
    b.pendingCount - a.pendingCount || b.reports.length - a.reports.length
  );

  // Stats
  const totalPending = userGroups.filter(g => g.pendingCount > 0).length;
  document.getElementById('stat-pending').textContent = `${totalPending} pending users`;
  document.getElementById('stat-users').textContent   = `${userGroups.length} users`;
  document.getElementById('stat-total').textContent   = `${reports.length} reports`;

  document.getElementById('loading-msg').style.display = 'none';
  renderGroups();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('perm-blocks-container').style.display = 'none';
  document.getElementById('groups-container').style.display = '';
  renderGroups();
}

// ── PERMANENT BLOCKS VIEW ────────────────────────────────────────────────────
async function showPermBlocks(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('groups-container').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  const container = document.getElementById('perm-blocks-container');
  container.style.display = '';
  container.innerHTML = '<div style="color:#475569;padding:20px">Loading permanent blocks…</div>';

  const res = await callAdmin({ action: 'get_permanent_blocks' });
  if (res.__session_expired) return;
  if (res.error) { container.innerHTML = `<div style="color:#F87171;padding:20px">Error: ${res.error}</div>`; return; }

  const blocks = (res.blocks || []).filter(b => b.type === 'device_id');
  if (!blocks.length) {
    container.innerHTML = '<div style="color:#475569;padding:20px;text-align:center">No permanent device blocks.</div>';
    return;
  }

  container.innerHTML = blocks.map(b => {
    const dh = b.device_history;
    const usernames = dh?.all_usernames?.length ? dh.all_usernames.join(', ') : '—';
    const blockedAt = new Date(b.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const safeDevice = escAttr(b.value);
    return `
      <div class="group-row" style="border-color:rgba(248,113,113,0.25)">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#F87171">⛔ ${escHtml(b.value.slice(-12))}</div>
            <div style="font-size:11px;color:#475569;margin-top:3px">${escHtml(b.reason)}</div>
            <div style="font-size:11px;color:#475569;margin-top:2px">Blocked ${blockedAt}</div>
            ${dh ? `<div style="font-size:11px;color:#FB923C;margin-top:4px">📱 ${dh.total_reports} reports · ${dh.actioned_reports} blocked</div>` : ''}
            <div style="font-size:11px;color:#94A3B8;margin-top:3px">Accounts: ${escHtml(usernames)}</div>
          </div>
          <button class="btn-action nothing" style="font-size:11px;white-space:nowrap" onclick="unblockDevice('${safeDevice}')">↩ Unblock Device</button>
        </div>
      </div>`;
  }).join('');
}

async function unblockDevice(deviceId) {
  if (!confirm(`Unblock device …${deviceId.slice(-8)}?\n\nAll accounts on this device will be unblocked.`)) return;
  const res = await callAdmin({ action: 'unblock_device', device_id: deviceId });
  if (res.__session_expired) return;
  if (res.error) { showToast('Error: ' + res.error, true); return; }
  showToast('Device unblocked');
  showPermBlocks(document.getElementById('perm-blocks-btn'));
}

function applySearch(q) {
  searchQuery = q.toLowerCase();
  renderGroups();
}

function renderGroups() {
  let groups = userGroups;

  // Filter
  if (currentFilter === 'pending')  groups = groups.filter(g => g.pendingCount > 0);
  if (currentFilter === 'actioned') groups = groups.filter(g => g.allActioned && !g.isDeleted);
  if (currentFilter === 'blocked')  groups = groups.filter(g =>
    !g.isDeleted && (g.user?.is_permanently_blocked || (g.user?.admin_blocked_until && new Date(g.user.admin_blocked_until) > new Date()))
  );
  // 'all' — show everything

  // Search
  if (searchQuery) {
    groups = groups.filter(g =>
      (g.user.chitzy_name || '').toLowerCase().includes(searchQuery) ||
      (g.phone || '').includes(searchQuery) ||
      g.reports.some(r => (r.reported_message_text || '').toLowerCase().includes(searchQuery))
    );
  }

  const container = document.getElementById('groups-container');
  const empty     = document.getElementById('empty-state');

  if (!groups.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  container.innerHTML = groups.map(g => groupHtml(g)).join('');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function groupHtml(g) {
  // Deleted account group
  if (g.isDeleted) return deletedGroupHtml(g);

  const u = g.user;
  const reporters = g.reports[0]?.unique_reporters || 0;
  const countClass = reporters >= 10 ? 'high' : reporters >= 5 ? 'med' : 'low';
  const isBlocked  = u.is_permanently_blocked || (u.admin_blocked_until && new Date(u.admin_blocked_until) > new Date());
  const groupClass = g.pendingCount > 0 ? 'has-pending' : isBlocked ? 'is-blocked' : '';

  // Block status
  let blockHtml = '<span class="block-status clean">Clean</span>';
  if (u.is_permanently_blocked) {
    blockHtml = '<span class="block-status perm">⛔ Permanently Blocked</span>';
  } else if (u.admin_blocked_until && new Date(u.admin_blocked_until) > new Date()) {
    const until = new Date(u.admin_blocked_until).toLocaleDateString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    blockHtml = `<span class="block-status temp">🔒 Until ${until}</span>`;
  }

  // Plan badge
  const plan = u.plan === 'pro'
    ? '<span class="plan-badge pro">PRO</span>'
    : '<span class="plan-badge free">FREE</span>';

  // Joined
  const joined = u.created_at
    ? new Date(u.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'2-digit' })
    : '—';

  // Latest message preview
  const latestMsg = g.reports[0]?.reported_message_text || '';
  const msgPreview = latestMsg
    ? escHtml(latestMsg.slice(0, 120)) + (latestMsg.length > 120 ? '…' : '')
    : '<em style="color:#475569">No message text</em>';

  // Note textarea id
  const noteId = `note_${g.uid.replace(/-/g,'')}`;
  // Most recent pending report id for status update
  const pendingReport = g.reports.find(r => r.status === 'pending');
  const reportId = pendingReport?.id || g.reports[0]?.id || '';

  const uid = escHtml(g.uid);
  const rId = escHtml(reportId);
  const safeNote = `note_${g.uid.replace(/-/g,'')}`;
  const safeName = escHtml(u.chitzy_name || '');

  return `
  <div class="user-group ${groupClass}" id="group_${g.uid.replace(/-/g,'')}">
    <div class="user-row" onclick="togglePanel('${g.uid.replace(/-/g,'')}')">
      <div class="user-info">
        <div class="user-name">
          <span class="expand-icon">▶</span>
          ${escHtml(u.chitzy_name || '—')} ${plan}
          ${g.pendingCount > 0 ? `<span style="background:rgba(249,115,22,0.2);color:#FB923C;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px">${g.pendingCount} pending</span>` : ''}
        </div>
        <div class="user-phone">${escHtml(g.phone)}</div>
        <div class="user-meta">Joined ${joined} · ${g.reports.length} report${g.reports.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="report-badge ${countClass}">
        ${reporters}
        <span>reporters</span>
        ${g.deviceHistory
          ? `<span style="color:#FB923C;font-size:10px;margin-top:4px;display:block">📱 ${g.deviceHistory.total_reports} reports · ${g.deviceHistory.actioned_reports} blocked</span>
             ${g.deviceHistory.all_usernames?.length > 1 ? `<span style="color:#475569;font-size:10px;display:block">was: ${g.deviceHistory.all_usernames.filter(n => n !== u.chitzy_name).join(', ')}</span>` : ''}`
          : '<span style="color:#475569;font-size:10px;margin-top:4px;display:block">📱 no device history</span>'}
      </div>
      <div class="latest-msg">${msgPreview}</div>
      <div>${blockHtml}</div>
      <div class="user-actions" onclick="event.stopPropagation()">
        <textarea class="note-input" id="${safeNote}" rows="1" placeholder="Admin note…"></textarea>
        <div class="action-row">
          <button class="btn-action nothing" onclick="doAction('do_nothing','${rId}','${uid}','${safeNote}')">✓ OK</button>
          <button class="btn-action" onclick="doAction('block_3d','${rId}','${uid}','${safeNote}')">3d</button>
          <button class="btn-action" onclick="doAction('block_7d','${rId}','${uid}','${safeNote}')">7d</button>
          <button class="btn-action danger" onclick="doAction('block_30d','${rId}','${uid}','${safeNote}')">30d</button>
          <button class="btn-action perm" onclick="confirmPerm('${rId}','${uid}','${safeNote}','${safeName}')">⛔</button>
        </div>
        ${isBlocked ? `<button class="btn-action nothing" style="font-size:10px" onclick="doAction('unblock','${rId}','${uid}','${safeNote}')">↩ Unblock</button>` : ''}
      </div>
    </div>
    <div class="reports-panel" id="panel_${g.uid.replace(/-/g,'')}">
      ${g.reports.map(r => reportItemHtml(r)).join('')}
    </div>
  </div>`;
}

function deletedGroupHtml(g) {
  // Collect unique device_ids from reports (stored at report creation time)
  const deviceIds = [...new Set(g.reports.map(r => r.reported_device_id).filter(Boolean))];
  const latestMsg = g.reports[0]?.reported_message_text || '';
  const msgPreview = latestMsg
    ? escHtml(latestMsg.slice(0, 120)) + (latestMsg.length > 120 ? '…' : '')
    : '<em style="color:#475569">No message text</em>';

  return `
  <div class="user-group" id="group___deleted__" style="border-color:rgba(255,255,255,0.08);opacity:0.7">
    <div class="user-row" onclick="togglePanel('__deleted__')">
      <div class="user-info">
        <div class="user-name">
          <span class="expand-icon">▶</span>
          <span style="color:#475569">🗑 Deleted Accounts</span>
          <span style="background:rgba(255,255,255,0.06);color:#475569;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px">${g.reports.length} reports</span>
        </div>
        <div class="user-meta">These users deleted their accounts</div>
      </div>
      <div class="report-badge low">${g.reports.length}<span>reports</span></div>
      <div class="latest-msg">${msgPreview}</div>
      <div>
        ${deviceIds.length
          ? `<span class="block-status temp">📱 ${deviceIds.length} device${deviceIds.length > 1 ? 's' : ''} on file</span>`
          : '<span class="block-status clean">No device IDs</span>'}
      </div>
      <div class="user-actions" onclick="event.stopPropagation()">
        ${deviceIds.length
          ? deviceIds.map(did => `<button class="btn-action perm" style="font-size:10px;margin-bottom:3px" onclick="blockDevice('${escHtml(did)}')">⛔ Block Device …${escHtml(did.slice(-6))}</button>`).join('')
          : '<span style="color:#475569;font-size:11px">Cannot block — no device ID stored</span>'}
        <div style="color:#475569;font-size:10px;margin-top:4px">Add reported_device_id to reports table to enable device blocking</div>
      </div>
    </div>
    <div class="reports-panel" id="panel___deleted__">
      ${g.reports.map(r => reportItemHtml(r)).join('')}
    </div>
  </div>`;
}

async function blockDevice(deviceId) {
  if (!confirm(`Block device …${deviceId.slice(-6)} permanently?\n\nThis user deleted their account but this device will be blocked from re-registering.`)) return;
  // Insert directly into blocked_identifiers via a known user_id is not available —
  // so we use a custom action. For now show instructions.
  showToast('Run in Supabase SQL: INSERT INTO blocked_identifiers (type, value, reason) VALUES (\'device_id\', \'' + deviceId + '\', \'Admin block — deleted account\') ON CONFLICT (type,value) DO NOTHING;', true);
}

function reportItemHtml(r) {
  const msg = r.reported_message_text
    ? r.reported_message_text.replace(/</g,'&lt;').replace(/>/g,'&gt;')
    : '<em style="color:#475569">No message text</em>';
  const date = r.created_at
    ? new Date(r.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' })
    : '—';
  return `
  <div class="report-item">
    <div class="report-msg">${msg}</div>
    <div class="report-date">${date}</div>
    <div><span class="status-badge ${r.status}">${r.status}</span></div>
  </div>`;
}

function togglePanel(uid) {
  const row   = document.getElementById(`group_${uid}`);
  const panel = document.getElementById(`panel_${uid}`);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  row.classList.toggle('expanded', !isOpen);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function doAction(action, reportId, userId, noteId) {
  const note = document.getElementById(noteId)?.value || '';
  const body = { action, report_id: reportId, user_id: userId, admin_note: note };
  const res  = await callAdmin(body);
  if (res.__session_expired) return;
  if (res.error) { showToast('Error: ' + res.error, true); return; }
  handleActionResponse(res, body);
}

function handleActionResponse(res, body) {
  const { action, report_id, user_id } = body;
  showToast(actionLabel(action));

  // Update all reports for this user in local state
  for (const r of allReports) {
    if (r.reported_user_id === user_id || r.reported_user?.id === user_id) {
      if (action === 'do_nothing') {
        if (r.id === report_id) r.status = 'reviewed';
      } else if (action !== 'unblock') {
        r.status = 'actioned';
      }
      if (action === 'block_permanent') r.reported_user.is_permanently_blocked = true;
      if (action === 'unblock') {
        r.reported_user.is_permanently_blocked = false;
        r.reported_user.admin_blocked_until = null;
      }
      // Don't optimistically update admin_blocked_until — block timestamp + device count
      // refresh only after clicking the Refresh button (so DB state is the source of truth)
    }
  }
  processReports(allReports);
}

function confirmPerm(reportId, userId, noteId, name) {
  if (confirm(`Permanently block ${name || 'this user'}?\n\nThis blocks their phone + device. They cannot create a new account.`)) {
    doAction('block_permanent', reportId, userId, noteId);
  }
}

function actionLabel(a) {
  return {
    do_nothing:      'Marked as reviewed',
    block_3d:        'Blocked for 3 days',
    block_7d:        'Blocked for 7 days',
    block_30d:       'Blocked for 30 days',
    block_permanent: 'Permanently blocked',
    unblock:         'User unblocked',
  }[a] || 'Done';
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// Auto-restore session on page load (survives refresh within 15 min)
if (restoreSession()) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  resetSessionTimer();
  loadReports();
}

// Auto-refresh when tab regains focus
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && adminPassword) loadReports();
});
</script>
</body>
</html>
